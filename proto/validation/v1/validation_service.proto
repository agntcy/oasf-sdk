syntax = "proto3";

package validation.v1;

import "types/v1alpha1/record.proto";

// ValidationService provides methods to validate OASF objects.
service ValidationService {
  // ValidateV070Record checks the validity of a V0.7.0 Record object.
  rpc ValidateV070Record(ValidateV070RecordRequest) returns (ValidateV070RecordResponse);

  // ValidateV070RecordStream validates multiple V0.7.0 Record objects using a stream.
  rpc ValidateV070RecordStream(stream Validate070RecordStreamRequest) returns (stream Validate070RecordStreamResponse);
}

message ValidateV070RecordRequest {
  // The Record object to be validated.
  types.v1alpha1.Record record = 1;

  // Optional schema URL to validate against instead of embedded schemas.
  // If provided, the validation service will fetch and validate against this schema URL.
  // If empty, validation uses the embedded JSON schemas in the binary.
  string schema_url = 2;
}

message ValidateV070RecordResponse {
  // Whether the Record is valid.
  bool is_valid = 1;

  // A list of validation errors, if any.
  repeated string errors = 2;
}

message Validate070RecordStreamRequest {
  // The Record object to be validated.
  types.v1alpha1.Record record = 1;

  // Optional schema URL to validate against instead of embedded schemas.
  // If provided, the validation service will fetch and validate against this schema URL.
  // If empty, validation uses the embedded JSON schemas in the binary.
  string schema_url = 2;
}

message Validate070RecordStreamResponse {
  // Whether the Record is valid.
  bool is_valid = 1;

  // A list of validation errors, if any.
  repeated string errors = 2;
}
